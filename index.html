<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>MEV Streckenkunde</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#0b1220" />
  <style>
    :root{
      --bg:#0b1220; --panel:#121a2b; --panel2:#0f1730; --text:#e8eefc; --muted:#9fb0d0;
      --blue:#0070ff; --red:#ff2a2a;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); overflow:hidden;}

    .topbar{position:fixed; left:0; right:0; top:0; z-index:30; height:54px; display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.08); background: rgba(11,18,32,.85); backdrop-filter: blur(8px);
    }
    .brand{font-weight:750;}
    .build{margin-left:auto; font-size:12px; color:var(--muted);}

    .hidden{display:none !important;}

    /* Bottom sheet */
    .sheet{position:fixed; left:0; right:0; bottom:0; z-index:20; background:rgba(18,26,43,.96);
      border-top:1px solid rgba(255,255,255,.10); border-radius: 18px 18px 0 0; box-shadow: var(--shadow);
      height: min(74vh, 680px); display:flex; flex-direction:column;
    }
    .grab{width:48px; height:5px; border-radius:999px; background: rgba(255,255,255,.18); margin: 6px auto 0;}
    .sheetHeader{padding:10px 12px 8px; display:flex; align-items:center; gap:10px;}
    .steps{display:flex; gap:8px; flex-wrap:wrap;}
    .step{font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.14); color:var(--muted);} 
    .step.active{color:var(--text); border-color: rgba(0,112,255,.55); background: rgba(0,112,255,.12);} 
    .dirty{margin-left:auto; font-size:12px; color:var(--muted);} 
    .sheetBody{padding:10px 12px 12px; overflow:auto; flex:1 1 auto;}

    .card{border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); border-radius:14px; padding:12px;}
    .hint{font-size:12px; color:var(--muted); line-height:1.35;}
    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 6px;}
    input, select{width:100%; height:40px; border-radius:12px; border:1px solid rgba(255,255,255,.14); background:var(--panel2); color:var(--text); padding:0 12px; outline:none;}
    input::placeholder{color: rgba(159,176,208,.7);}

    .row3{display:grid; grid-template-columns: 1fr 1fr 140px; gap:10px;}
    @media (max-width: 520px){ .row3{grid-template-columns:1fr;} }

    .btn{height:42px; padding:0 12px; border-radius:12px; border:1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.06);
      color:var(--text); font-weight:700; cursor:pointer;}
    .btn.primary{border-color: rgba(0,112,255,.65); background: rgba(0,112,255,.16);} 
    .btn:disabled{opacity:.55; cursor:not-allowed;}

    /* Map */
    .mapWrap{position:fixed; inset:54px 0 0 0; background:#fff;}
    #mapHost{position:absolute; inset:0; overflow:hidden;}
    #mapHost svg{width:100%; height:100%; display:block; touch-action:none;}

    .toast{position:fixed; left:50%; bottom: calc(min(74vh,680px) + 10px); transform:translateX(-50%);
      background: rgba(18,26,43,.98); border: 1px solid rgba(255,255,255,.16);
      padding: 10px 12px; border-radius: 12px; font-size: 13px; color: var(--text);
      max-width: min(860px, 92vw); display:none; z-index:50;}
    .toast.show{display:block;}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">MEV Streckenkunde</div>
    <div class="build">Build: 2026-03-12 09:54 UTC</div>
  </div>

  <div class="mapWrap">
    <div id="mapHost"></div>
  </div>

  <div id="toast" class="toast"></div>

<script>
(() => {
  'use strict';

  // ---- Helpers ----
  const $ = (id) => document.getElementById(id);
  const st = {
    svgText: null,
    svgRoot: null,
    viewBase: null,
    mode: 'pan',
    pick: 'kundig'
  };

  function toast(msg){
    const t = $('toast');
    if(!t) return;
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ---- Header Tap Anzeige (nur bei Tap) ----
  const buildEl = document.querySelector('.topbar .build');
  const originalBuildText = buildEl ? buildEl.textContent : '';
  let buildTimer = null;
  let wiredSvgForHeaderTap = null;

  function showHeaderTemp(text, ms = 1800){
    if(!buildEl) return;
    buildEl.textContent = text;
    clearTimeout(buildTimer);
    if(ms > 0 && originalBuildText){
      buildTimer = setTimeout(() => buildEl.textContent = originalBuildText, ms);
    }
  }

  function labelNurInkscape(el){
    const label = (el?.getAttribute('inkscape:label') || '').trim();
    return label || '(ohne Label)';
  }

  function getDataTyp(el){
    return (el?.getAttribute('data-typ') || '').trim();
  }

  function isStation(el){
    if(getDataTyp(el) === 'Station') return true;
    const id = (el?.id || '').toLowerCase().trim();
    return id.startsWith('station_') || id.startsWith('unoccupied_station_');
  }

  function isTanklager(el){
    const id = (el?.id || '').toLowerCase().trim();
    return id === 'tanklager' || id.startsWith('tanklager_');
  }

  function findKlickZiel(startEl, svgRoot){
    let el = startEl;
    while(el && el !== svgRoot){
      if(isStation(el) || isTanklager(el)) return el;
      el = el.parentNode;
    }
    return null;
  }

  // Nur bei echtem Tap (nicht beim Pan/Drag): Distanz- und Zeit-Schwellen
  function wireHeaderTapToCurrentSvg(){
    const svgRoot = st.svgRoot;
    if(!svgRoot || !buildEl) return;
    if(wiredSvgForHeaderTap === svgRoot) return;

    let down = null;

    svgRoot.addEventListener('pointerdown', (ev) => {
      // nur Primärtaste/Finger
      if(ev.button != null && ev.button !== 0) return;
      down = { x: ev.clientX, y: ev.clientY, t: performance.now(), target: ev.target };
    }, { passive: true });

    svgRoot.addEventListener('pointerup', (ev) => {
      if(!down) return;
      const dt = performance.now() - down.t;
      const dx = ev.clientX - down.x;
      const dy = ev.clientY - down.y;
      const dist = Math.hypot(dx, dy);

      // Schwellen: kurzer Tap, kaum Bewegung
      if(dt <= 550 && dist <= 8){
        const el = findKlickZiel(ev.target, svgRoot);
        if(el){
          const label = labelNurInkscape(el);
          const text = isTanklager(el) ? `Tanklager: ${label}` : label;
          showHeaderTemp(text, 1800);
        }
      }
      down = null;
    }, { passive: true });

    // falls Touch abbricht
    svgRoot.addEventListener('pointercancel', () => { down = null; }, { passive: true });

    wiredSvgForHeaderTap = svgRoot;
  }

  // ---- Minimal Map Loader ----
  async function ensureAssetsLoaded(){
    if(st.svgText) return;
    const res = await fetch('assets/map.svg', { cache: 'no-store' });
    if(!res.ok) throw new Error('map.svg konnte nicht geladen werden: ' + res.status);
    st.svgText = await res.text();
  }

  function getInitialViewBox(svg){
    const vb = svg.getAttribute('viewBox');
    if(vb){
      const [x,y,w,h] = vb.split(/\s+/).map(Number);
      if([x,y,w,h].every(n => Number.isFinite(n))) return {x,y,w,h};
    }
    // fallback
    const w = Number(svg.getAttribute('width')) || 1000;
    const h = Number(svg.getAttribute('height')) || 700;
    return {x:0, y:0, w, h};
  }

  function setViewBox(v){
    st.svgRoot.setAttribute('viewBox', `${v.x} ${v.y} ${v.w} ${v.h}`);
  }

  function enableTouchPanZoom(){
    // Placeholder: hier ist dein bestehender Pan/Zoom Code
  }

  function enablePointEditing(){
    // Placeholder: hier ist dein bestehender Edit Code
  }

  function applySelectionToSvg(){
    // Placeholder: hier kommt deine bestehende Markierungslogik
  }

  function embedSvg(){
    const doc = new DOMParser().parseFromString(st.svgText,'image/svg+xml');
    const err = doc.querySelector('parsererror');
    if(err){ toast('SVG Parse-Fehler'); console.error(err.textContent); return; }
    const svg = doc.querySelector('svg');
    if(!svg){ toast('Keine SVG gefunden'); return; }
    const host = $('mapHost');
    host.innerHTML = '';
    const imported = document.importNode(svg,true);
    imported.style.width = '100%';
    imported.style.height = '100%';
    imported.style.display = 'block';
    host.appendChild(imported);

    st.svgRoot = imported;
    st.viewBase = getInitialViewBox(st.svgRoot);
    setViewBox({ ...st.viewBase });

    enableTouchPanZoom();
    enablePointEditing();

    // Tap-Anzeige erst jetzt verdrahten (SVG existiert)
    wireHeaderTapToCurrentSvg();
  }

  async function goMap(){
    await ensureAssetsLoaded();
    if(!st.svgRoot) embedSvg();
    applySelectionToSvg();
  }

  // Start
  goMap().catch(e => { console.error(e); toast('Karte konnte nicht geladen werden.'); });
})();
</script>
</body>
</html>
